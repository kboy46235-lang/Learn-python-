name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
            python3-pip \
            build-essential \
            git \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev

    - name: Install Buildozer and Dependencies
      run: |
        pip install --upgrade pip
        pip install cython==0.29.36
        pip install buildozer

    - name: Build with Buildozer
      run: |
        # Create default buildozer.spec if not exists
        buildozer init || true
        # Fix requirements in spec to include kivy, jnius, requests etc.
        sed -i 's/#requirements = python3,kivy/requirements = python3,kivy,requests,jnius/g' buildozer.spec
        sed -i 's/#title = My Application/title = Learn Python Pro/g' buildozer.spec
        sed -i 's/#package.name = myapp/package.name = learnpythonpro/g' buildozer.spec
        sed -i 's/#package.domain = org.test/package.domain = org.manish/g' buildozer.spec
        
        buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: app-debug
        path: bin/*.apk
        
